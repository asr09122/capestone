version: "3.9"

# RetailFlow AI — full stack docker-compose
# Usage:
#   docker compose up --build
#   FastAPI   → http://localhost:8000/docs
#   Streamlit → http://localhost:8501

services:

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: retailflow-api
    ports:
      - "8000:8000"
    volumes:
      - retailflow_data:/app/data          # shared volume — API owns DB migrations
    environment:
      - NVIDIA_API_KEY=${NVIDIA_API_KEY:-}
      - SECRET_KEY=${SECRET_KEY:-changeme-in-production}
      - DATABASE_URL=sqlite:////app/data/retailflow.db
      - DB_PATH=/app/data/retailflow.db
      - FAISS_INDEX_PATH=/app/data/faiss_index
      - ALLOWED_ORIGINS=http://localhost:8501
      # LangSmith tracing — leave blank to disable, set all three to enable
      - LANGSMITH_API_KEY=${LANGSMITH_API_KEY:-}
      - LANGSMITH_PROJECT=${LANGSMITH_PROJECT:-retailflow-ai}
      - LANGSMITH_TRACING=${LANGSMITH_TRACING:-false}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: retailflow-ui
    ports:
      - "8501:8501"
    volumes:
      - retailflow_data:/app/data          # shared volume — reads same DB as API
    environment:
      - API_BASE_URL=http://api:8000
      - DB_PATH=/app/data/retailflow.db
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  mcp:
    build:
      context: .
      dockerfile: Dockerfile               # reuses API image — all deps already installed
    container_name: retailflow-mcp
    ports:
      - "6006:6006"                        # MCP SSE endpoint: http://localhost:6006/sse
    volumes:
      - retailflow_data:/app/data          # shared volume — same DB as API
    environment:
      - DATABASE_URL=sqlite:////app/data/retailflow.db
      - DB_PATH=/app/data/retailflow.db
      - FAISS_INDEX_PATH=/app/data/faiss_index
      - MCP_TRANSPORT=sse                  # switch from stdio → SSE for network access
      - FASTMCP_PORT=6006                  # FastMCP reads this as its HTTP port (prefix: FASTMCP_)
      # LangSmith tracing — inherits same keys as API
      - LANGSMITH_API_KEY=${LANGSMITH_API_KEY:-}
      - LANGSMITH_PROJECT=${LANGSMITH_PROJECT:-retailflow-ai}
      - LANGSMITH_TRACING=${LANGSMITH_TRACING:-false}
      - NVIDIA_API_KEY=${NVIDIA_API_KEY:-}
      - SECRET_KEY=${SECRET_KEY:-changeme-in-production}
    entrypoint: ["python", "mcp_server.py"] # override API entrypoint
    depends_on:
      api:
        condition: service_healthy         # wait for DB migrations to complete first
    restart: unless-stopped

volumes:
  retailflow_data:                         # named volume shared by api + streamlit + mcp
